name: Tauri Host CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tauri-host-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-check:
    name: Cargo Check (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check
