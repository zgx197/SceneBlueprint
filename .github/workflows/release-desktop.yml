name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version without the v prefix. Leave empty to use the repository version.'
        required: false
        type: string
      publish_release:
        description: 'Publish as a formal GitHub Release instead of a draft'
        required: true
        default: false
        type: boolean
      prerelease:
        description: 'Whether to mark the GitHub release as a prerelease'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release-windows:
    name: Build Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          $eventName = "${{ github.event_name }}"
          $refName = "${{ github.ref_name }}"
          $manualVersion = "${{ inputs.version }}".Trim()
          if ($manualVersion.StartsWith("v")) {
            $manualVersion = $manualVersion.Substring(1)
          }

          $packageVersion = node -p "require('./package.json').version"
          $packageVersion = $packageVersion.Trim()
          $tauriVersion = (Get-Content 'src-tauri/tauri.conf.json' -Raw | ConvertFrom-Json).version

          $cargoVersion = ''
          $inPackage = $false
          foreach ($line in Get-Content 'src-tauri/Cargo.toml') {
            if ($line -match '^\[package\]') {
              $inPackage = $true
              continue
            }

            if ($inPackage -and $line -match '^\[') {
              break
            }

            if ($inPackage -and $line -match '^version\s*=\s*"([^"]+)"') {
              $cargoVersion = $Matches[1]
              break
            }
          }

          if ([string]::IsNullOrWhiteSpace($cargoVersion)) {
            throw "Could not read version from src-tauri/Cargo.toml."
          }

          if ($eventName -eq 'push') {
            $version = $refName
            if ($version.StartsWith('v')) {
              $version = $version.Substring(1)
            }
            $versionSource = 'tag'
            $releaseDraft = 'false'
            $prerelease = if ($version.Contains('-')) { 'true' } else { 'false' }
          } elseif ([string]::IsNullOrWhiteSpace($manualVersion)) {
            $version = $packageVersion

            if ($packageVersion -ne $tauriVersion -or $packageVersion -ne $cargoVersion) {
              throw "Version files are inconsistent. package.json=$packageVersion, src-tauri/tauri.conf.json=$tauriVersion, src-tauri/Cargo.toml=$cargoVersion. Align them first or provide the workflow version input."
            }

            $versionSource = 'repository'
            $releaseDraft = if ("${{ inputs.publish_release }}" -eq 'true') { 'false' } else { 'true' }
            $prerelease = if ("${{ inputs.prerelease }}" -eq 'true') { 'true' } else { 'false' }
          } else {
            $version = $manualVersion
            $versionSource = 'manual-input'
            $releaseDraft = if ("${{ inputs.publish_release }}" -eq 'true') { 'false' } else { 'true' }
            $prerelease = if ("${{ inputs.prerelease }}" -eq 'true') { 'true' } else { 'false' }
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$') {
            throw "Invalid version '$version'. Expected semver like 0.1.0 or 0.1.0-beta.1."
          }

          $includeMsi = if ($version.Contains('-')) { 'false' } else { 'true' }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "release_name=SceneBlueprint v$version" >> $env:GITHUB_OUTPUT
          "release_draft=$releaseDraft" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT
          "version_source=$versionSource" >> $env:GITHUB_OUTPUT
          "include_msi=$includeMsi" >> $env:GITHUB_OUTPUT
          "portable_asset_name=SceneBlueprint_${version}_x64_portable.zip" >> $env:GITHUB_OUTPUT

      - name: Sync version files for this build
        if: ${{ steps.release_meta.outputs.version_source != 'repository' }}
        shell: pwsh
        run: |
          $version = "${{ steps.release_meta.outputs.version }}"

          $packagePath = 'package.json'
          $package = Get-Content $packagePath -Raw | ConvertFrom-Json
          $package.version = $version
          $packageJson = $package | ConvertTo-Json -Depth 100
          [System.IO.File]::WriteAllText((Resolve-Path $packagePath), $packageJson + [Environment]::NewLine, [System.Text.UTF8Encoding]::new($false))

          $tauriPath = 'src-tauri/tauri.conf.json'
          $tauri = Get-Content $tauriPath -Raw | ConvertFrom-Json
          $tauri.version = $version
          $bundleTargets = if ("${{ steps.release_meta.outputs.include_msi }}" -eq 'true') { @('msi', 'nsis') } else { @('nsis') }
          if ($null -eq $tauri.bundle) {
            throw "Could not read bundle configuration from src-tauri/tauri.conf.json."
          }
          if ($tauri.bundle.PSObject.Properties.Name -contains 'targets') {
            $tauri.bundle.targets = $bundleTargets
          } else {
            $tauri.bundle | Add-Member -NotePropertyName targets -NotePropertyValue $bundleTargets
          }
          $tauriJson = $tauri | ConvertTo-Json -Depth 100
          [System.IO.File]::WriteAllText((Resolve-Path $tauriPath), $tauriJson + [Environment]::NewLine, [System.Text.UTF8Encoding]::new($false))

          $cargoPath = 'src-tauri/Cargo.toml'
          $cargoLines = Get-Content $cargoPath
          $inPackage = $false
          $updated = $false

          for ($i = 0; $i -lt $cargoLines.Count; $i++) {
            if ($cargoLines[$i] -match '^\[package\]') {
              $inPackage = $true
              continue
            }

            if ($inPackage -and $cargoLines[$i] -match '^\[') {
              break
            }

            if ($inPackage -and $cargoLines[$i] -match '^version\s*=') {
              $cargoLines[$i] = "version = `"$version`""
              $updated = $true
              break
            }
          }

          if (-not $updated) {
            throw "Could not update version in src-tauri/Cargo.toml."
          }

          [System.IO.File]::WriteAllLines((Resolve-Path $cargoPath), $cargoLines, [System.Text.UTF8Encoding]::new($false))

      - name: Write release summary
        shell: pwsh
        run: |
          $publishMode = if ("${{ steps.release_meta.outputs.release_draft }}" -eq 'true') { 'draft' } else { 'formal' }
          $bundleMode = if ("${{ steps.release_meta.outputs.include_msi }}" -eq 'true') { 'nsis + msi + portable' } else { 'nsis + portable' }
          @"
          ## Desktop Release
          - Version: `${{ steps.release_meta.outputs.version }}`
          - Tag: `${{ steps.release_meta.outputs.tag }}`
          - Publish mode: $publishMode
          - Prerelease: `${{ steps.release_meta.outputs.prerelease }}`
          - Version source: `${{ steps.release_meta.outputs.version_source }}`
          - Bundle mode: $bundleMode
          - Portable asset: `${{ steps.release_meta.outputs.portable_asset_name }}`
          "@ >> $env:GITHUB_STEP_SUMMARY

      - name: Compose release notes
        id: release_notes
        shell: pwsh
        run: |
          $version = "${{ steps.release_meta.outputs.version }}"
          $lines = [System.Collections.Generic.List[string]]::new()
          $lines.Add("SceneBlueprint v$version 发布说明")
          $lines.Add("")
          $lines.Add("## 下载文件说明")
          $lines.Add("- `SceneBlueprint_${version}_x64-setup.exe`：Windows NSIS 安装版，适合大多数 Windows 用户直接安装使用。")
          if ("${{ steps.release_meta.outputs.include_msi }}" -eq 'true') {
            $lines.Add("- `SceneBlueprint_${version}_x64_en-US.msi`：Windows MSI 安装包，适合企业环境、静默安装或统一部署。")
          } else {
            $lines.Add("- 当前版本为预发布语义化版本，MSI 安装包因 Windows Installer 版本号限制而跳过，仅提供 NSIS 安装版与绿色版。")
          }
          $lines.Add("- `${{ steps.release_meta.outputs.portable_asset_name }}`：Windows 免安装绿色版压缩包，解压后可直接运行，适合快速测试。")
          $lines.Add("")
          $lines.Add("## 构建信息")
          $lines.Add("- 触发方式：${{ github.event_name }}")
          $lines.Add("- 构建平台：windows-latest")
          $lines.Add("- 对应提交：${{ github.sha }}")
          $lines.Add("- 版本来源：${{ steps.release_meta.outputs.version_source }}")
          $lines.Add("")
          $lines.Add("更多背景说明可查看：")
          $lines.Add("- 仓库首页：https://github.com/zgx197/SceneBlueprint")
          $lines.Add("- 发布文档：https://zgx197.github.io/SceneBlueprint/")

          "body<<EOF" >> $env:GITHUB_OUTPUT
          $lines | ForEach-Object { $_ >> $env:GITHUB_OUTPUT }
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Build and upload desktop bundles
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./
          tagName: ${{ steps.release_meta.outputs.tag }}
          releaseName: ${{ steps.release_meta.outputs.release_name }}
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: ${{ steps.release_meta.outputs.release_draft }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          generateReleaseNotes: false

      - name: Create portable zip
        id: portable
        shell: pwsh
        run: |
          $version = "${{ steps.release_meta.outputs.version }}"
          $assetName = "${{ steps.release_meta.outputs.portable_asset_name }}"
          $bundleRoot = Join-Path (Resolve-Path 'src-tauri/target/release/bundle') 'portable'
          $portableRoot = Join-Path $bundleRoot "SceneBlueprint-portable-$version"
          $exeSource = Resolve-Path 'src-tauri/target/release/sceneblueprint.exe'
          $exeTarget = Join-Path $portableRoot 'SceneBlueprint.exe'
          $readmePath = Join-Path $portableRoot 'README.txt'
          $zipPath = Join-Path $bundleRoot $assetName

          New-Item -ItemType Directory -Force -Path $portableRoot | Out-Null
          Copy-Item $exeSource $exeTarget -Force

          @(
            'SceneBlueprint Portable',
            '',
            '- 运行方式：双击 SceneBlueprint.exe',
            "- 当前版本：$version",
            '- 说明：这是免安装绿色版，适合快速验证与测试。',
            '- 注意：如果 Windows 提示安全警告，请根据本机策略选择继续运行。'
          ) | Set-Content -LiteralPath $readmePath -Encoding UTF8

          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $portableRoot '*') -DestinationPath $zipPath -CompressionLevel Optimal

          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Upload portable zip to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.release_meta.outputs.tag }}" "${{ steps.portable.outputs.zip_path }}" --clobber

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: sceneblueprint-windows-bundle-${{ steps.release_meta.outputs.version }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: error
          retention-days: 30
