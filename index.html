<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SceneBlueprint</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI Variable", "Segoe UI", "Microsoft YaHei UI", sans-serif;
        background: #f5f1e8;
        color: #2f2a24;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgba(215, 155, 83, 0.14), transparent 22%),
          radial-gradient(circle at right, rgba(63, 134, 184, 0.1), transparent 18%),
          linear-gradient(180deg, #f5f1e8 0%, #ebe4d7 100%);
      }

      #root {
        width: 100%;
        height: 100%;
      }

      .sb-boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: inherit;
      }

      .sb-boot-card {
        width: min(560px, 100%);
        padding: 24px;
        border: 1px solid rgba(129, 117, 98, 0.18);
        border-radius: 20px;
        background: rgba(255, 252, 246, 0.92);
        box-shadow: 0 18px 42px rgba(110, 92, 63, 0.12);
      }

      .sb-boot-hero {
        display: grid;
        grid-template-columns: 78px minmax(0, 1fr);
        gap: 14px;
        align-items: center;
      }

      .sb-boot-mark {
        position: relative;
        width: 78px;
        height: 78px;
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(248, 242, 233, 0.95), rgba(232, 224, 211, 0.96));
        border: 1px solid rgba(129, 117, 98, 0.18);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.78);
      }

      .sb-boot-mark span {
        position: absolute;
        display: block;
        border-radius: 12px;
      }

      .sb-boot-mark-a {
        inset: 14px 38px 36px 14px;
        background: linear-gradient(180deg, rgba(215, 155, 83, 0.92), rgba(200, 134, 56, 0.95));
      }

      .sb-boot-mark-b {
        inset: 18px 16px 40px 44px;
        background: linear-gradient(180deg, rgba(63, 134, 184, 0.9), rgba(50, 111, 154, 0.94));
      }

      .sb-boot-mark-c {
        inset: 44px 20px 16px 20px;
        background: linear-gradient(180deg, rgba(94, 151, 116, 0.9), rgba(74, 124, 94, 0.95));
      }

      .sb-boot-mark-line {
        left: 37px;
        top: 20px;
        width: 4px;
        height: 38px;
        background: rgba(255, 252, 246, 0.88);
      }

      .sb-boot-eyebrow {
        margin: 0 0 8px;
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #3f86b8;
      }

      .sb-boot-card h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.08;
      }

      .sb-boot-card p {
        margin: 10px 0 0;
        font-size: 13px;
        line-height: 1.5;
        color: #6f6559;
      }

      .sb-boot-track {
        margin-top: 18px;
        height: 7px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(129, 117, 98, 0.14);
      }

      .sb-boot-bar {
        width: 34%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #d79b53 0%, #3f86b8 100%);
        animation: sb-boot-loading 1.2s ease-in-out infinite;
        transform-origin: left center;
      }

      @keyframes sb-boot-loading {
        0% {
          transform: translateX(-120%) scaleX(0.92);
        }
        50% {
          transform: translateX(120%) scaleX(1.08);
        }
        100% {
          transform: translateX(320%) scaleX(0.92);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" class="sb-boot-splash">
      <div class="sb-boot-card">
        <div class="sb-boot-hero">
          <div class="sb-boot-mark" aria-hidden="true">
            <span class="sb-boot-mark-a"></span>
            <span class="sb-boot-mark-b"></span>
            <span class="sb-boot-mark-c"></span>
            <span class="sb-boot-mark-line"></span>
          </div>
          <div>
            <p class="sb-boot-eyebrow">SCENEBLUEPRINT / STARTUP</p>
            <h1>正在启动 SceneBlueprint</h1>
            <p>正在连接桌面宿主并装配工作台，请稍候。</p>
          </div>
        </div>
        <div class="sb-boot-track">
          <div class="sb-boot-bar"></div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
